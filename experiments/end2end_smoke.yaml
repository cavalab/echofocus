experiment_name: end2end_smoke
operation: train_ping_pong
dataset: bch_internal
base_model_name: echofocus_e2e_smoke
seeds_file: seeds.txt
ntrials: 1

account: chip-lacava
partition: gpu-chip-lacava
gpus: 1
time_limit: "00:30:00"
ntasks: 1
cpus_per_task: 4
mem: 64G
qos: unlimited

command_prefix: uv run
cli_script: echofocus.py
jobs_dir: slurm_jobs
logs_dir: slurm_logs

tasks:
  - chd

transformer_types:
  - multiquery

learning_rates:
  - 1.0e-4

num_clips:
  - 1

clip_lengths:
  - 16

max_videos_per_study:
  - 1

train_args:
  config: config.json
  end_to_end: true
  cache_panecho_embeddings: true
  use_hdf5_index: true
  batch_number: 1
  total_epochs: 1
  epoch_early_stop: 1
  amp: true
  checkpoint_panecho: true
  parallel_processes: 1
  gpu_monitor: false
  ram_monitor: false
  panecho_trainable: true
  transformer_trainable: true
  smoke_train: true
  smoke_num_steps: 1
  sample_limit: 32

submit: false
print_only: false
